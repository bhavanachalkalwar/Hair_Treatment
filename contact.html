<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Kesh Sakhi</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header id="navbar"></header>

    <main>
        <section id="contact-hero">
            <div class="container">
                <h1>Contact Us</h1>
                <p>Get in touch with us for any questions or support.</p>
            </div>
        </section>

        <section id="contact-info">
            <div class="container">
                <div class="contact-details">
                    <h2>Contact Information</h2>
                    <p><strong>Email:</strong> bhavanachalkalwar7@gmail.com</p>
                    <p><strong>Phone:</strong> +91 96235 83148</p>
                    <p><strong>Address:</strong> Ayurvedic Wellness Center, Amravati</p>
                </div>
            </div>
        </section>

        <section id="contact-form">
            <div class="container">
                <h2>Send us a Message</h2>
                <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
                    <input type="hidden" name="_subject" value="New Contact Message from Kesh Sakhi Website">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit" class="cta-button">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer id="footer"></footer>

    <script src="js/components/Navbar.js"></script>
    <script src="js/components/Footer.js"></script>
    <script src="js/pages/ContactPage.js"></script>
</body>
</html>
